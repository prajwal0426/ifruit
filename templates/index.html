<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>I ultre | Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="home-body">



<!-- REQUIRED FOR LAMP TOGGLE -->
 

<input id="switch" type="checkbox">

<div class="wrap">

  <!-- LEFT SIDE (LOGIN FORM) -->
  <div class="left">

  <div class="auth-box" id="authBox">

    <h2 id="title">Login</h2>

    <form id="authForm" method="POST" action="/login">

      <input
        type="text"
        name="username"
        id="usernameInput"
        placeholder="Username"
        required
        oninput="checkFormReady && checkFormReady()"
      >

      <div class="password-wrapper">
        <input
          type="password"
          name="password"
          id="passwordInput"
          placeholder="Password"
          required
          oninput="checkStrength(this.value); checkFormReady && checkFormReady()"
        >
        <span class="eye closed" id="eyeToggle" onclick="togglePassword()"></span>
      </div>

      <div class="strength" id="strengthText"></div>

      <div class="actions">

        <button type="submit" id="submitBtn" class="login-btn">
          Login
        </button>

        <button
          type="button"
          class="register-btn"
          onclick="window.location.href='/register'">
          Register
        </button>

      </div>

    </form>

    <a href="/login/google" class="google-btn">
      <img src="https://developers.google.com/identity/images/g-logo.png">
      Continue with Google
    </a>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

  </div>

  </div>


  <!-- RIGHT SIDE (LAMP) -->
  <div class="right">

    <div class="glow"></div>

    <!-- CONNECTED TO SWITCH -->
    <label for="switch" class="lamp-label">

      <div class="lamp">

        <div class="lamp-bulb">
          <div class="filament"></div>
        </div>

        <div class="neck"></div>

        <div class="base"></div>

        <div class="lamp-caption">
          Lamp (click)
        </div>

      </div>

    </label>

  </div>

</div>

<script src="{{ url_for('static', filename='auth.js') }}"></script>

</body>
</html>
