<!DOCTYPE html>
<html lang="en">

    <head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="profile-page">
  

<div class="auth-box show profile-box">

  <h2>Profile</h2>

  <!-- Current Avatar -->
  {% if user.avatar %}
    {% if user.avatar.startswith('avatars/') %}
        <img src="{{ url_for('static', filename=user.avatar) }}" class="avatar-circle">
    {% else %}
        <img src="{{ url_for('uploaded_file', filename=user.avatar) }}" class="avatar-circle">
    {% endif %}
{% else %}
    <img src="{{ url_for('static', filename='avatars/default.png') }}" class="avatar-circle">
{% endif %}

  <!-- Toggle Button -->
  <button type="button" class="register-btn"
          onclick="toggleAvatars()">
      Change Avatar
  </button>

  <!-- Avatar Selection (Hidden by default) -->
  <div id="avatarSection" class="avatar-grid profile-avatar-grid">
    {% for avatar in [
      'rose.png','shadowbit.png','sofia.png','steelcore.png',
      'tunderframe.png','vortexarmor.png','warforge.png','zara.png'
    ] %}
    <label>
      <input type="radio" name="avatar_choice"
             value="avatars/{{ avatar }}" hidden>
      <img src="{{ url_for('static', filename='avatars/' ~ avatar) }}"
           class="avatar-option">
    </label>
    {% endfor %}
  </div>

  <form action="/profile/update" method="POST" enctype="multipart/form-data">

      <input type="file" name="avatar" accept="image/*">

      <input type="text" value="{{ user.username }}" disabled>
      <input type="email" value="{{ user.email }}" disabled>

      <input type="text" name="mobile"
             placeholder="Mobile Number"
             value="{{ user.mobile or '' }}">

      <input type="date" name="dob"
             value="{{ user.dob or '' }}">

      <textarea name="address"
                placeholder="Address">{{ user.address or '' }}</textarea>

      <button type="submit" class="login-btn">Save</button>

  </form>

</div>

<script>
document.getElementById("toggleAvatars").addEventListener("click", function() {
    const container = document.getElementById("avatarContainer");
    container.style.display =
        container.style.display === "none" ? "block" : "none";
});
</script>

</body>
</html>
