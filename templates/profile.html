<!DOCTYPE html>
<html lang="en">

    <head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="profile-row">
  <label>Avatar</label>

  <!-- Current Avatar -->
  {% if user.avatar %}
    {% if user.avatar.startswith('avatars/') %}
      <img src="{{ url_for('static', filename=user.avatar) }}"
           class="avatar-preview">
    {% else %}
      <img src="{{ url_for('uploaded_file', filename=user.avatar) }}"
           class="avatar-preview">
    {% endif %}
  {% endif %}

  <!-- Default Avatar Selection -->
  <div class="avatar-select-grid">
    {% for avatar in [
      'rose.png','aanya.png','aegisprime.png','aisha.png','atlasdrime '
    ] %}
    <label>
      <input type="radio" name="avatar_choice"
             value="avatars/{{ avatar }}" hidden>
      <img src="{{ url_for('static', filename='avatars/' ~ avatar) }}"
           class="avatar-option-small">
    </label>
    {% endfor %}
  </div>

  <!-- Upload Custom Avatar -->
  <input type="file" name="avatar" accept="image/*">
</div>

            <label>Username</label>
            <input type="text" value="{{ user.username }}" disabled>

            <label>Email</label>
            <input type="email" value="{{ user.email }}" disabled>

            <label>Mobile Number</label>
            <input type="text" name="mobile" placeholder="Enter mobile number"
                   value="{{ user.mobile or '' }}">

            <label>Date of Birth</label>
            <input type="date" name="dob" value="{{ user.dob or '' }}">

            <label>Address</label>
            <textarea name="address" placeholder="Enter address">{{ user.address or '' }}</textarea>

            <button type="submit">Save</button>
        </form>
    </div>

</body>
</html>
